<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sing Up</title>
</head>
<body>
    <form method="post" action="/account/verification">
        {% csrf_token %}

        <label>Username</label><input type="text" name="username" placeholder="Alberto">
        <label>Email</label><input type="email" name="email" placeholder="albert@einstein.com">
        <label>Password</label><input type="password" name="password" placeholder="albert1879">
        <label>Password Repeated</label><input type="password" name="rep_password" placeholder="albert1879">
        <input type="submit" value="submit">

        {% for message in messages %}
        <span class="error">{{message}}</span>
        {% endfor %}
    </form>
</body>
</html>
